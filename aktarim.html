<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Toplu Tuzak Aktarımı</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body style="font-family: Arial; padding: 30px; background-color: #f4f4f9;">
    <h2>Toplu Tuzak Yükleme Aracı</h2>
    <p>Aşağıdaki kutuya verilerinizi yapıştırın:</p>
    
    <textarea id="veriKutusu" style="width: 100%; height: 300px; padding: 10px;" placeholder="Verilerinizi buraya yapıştırın..."></textarea>
    <br><br>
    
    <button onclick="verileriYukle()" style="padding: 12px 24px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">Tümünü Veritabanına Aktar</button>
    
    <h3 id="durum" style="color: #333;"></h3>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBk53aTZ5cB2G_Fq64jRgkErEwmqOGNOBs",
            authDomain: "kokarca-tuzak-takip-sist-99696.firebaseapp.com",
            projectId: "kokarca-tuzak-takip-sist-99696",
            storageBucket: "kokarca-tuzak-takip-sist-99696.firebasestorage.app",
            messagingSenderId: "125586984500",
            appId: "1:125586984500:web:dbcc8cb4cad8904a2a8461"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function verileriYukle() {
            const metin = document.getElementById('veriKutusu').value;
            const satirlar = metin.split('\n');
            let basarili = 0;
            
            document.getElementById('durum').innerText = "Yükleniyor, lütfen sekmeyi kapatmayın...";

            for (let i = 0; i < satirlar.length; i++) {
                let satir = satirlar[i].trim();
                if (satir === "") continue;

                let parcalar = satir.split(',');
                if (parcalar.length < 3) continue;

                let adStr = parcalar[1];
                let lat = parseFloat(parcalar[2]);
                let lng = parseFloat(parcalar[3]);

                if (!isNaN(lat) && !isNaN(lng)) {
                    try {
                        await db.collection("tuzaklar").add({
                            ad: adStr,
                            lat: lat,
                            lng: lng,
                            tarih: new Date().toLocaleDateString('tr-TR')
                        });
                        basarili++;
                    } catch (e) {
                        console.error("Hata:", e);
                    }
                }
            }
            document.getElementById('durum').innerText = basarili + " adet tuzak başarıyla veritabanına yüklendi! Artık mobil haritanızı açabilirsiniz.";
        }
    </script>
</body>
</html>
