<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kokarca Haritası</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #harita { height: 100vh; width: 100%; }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content {
            background: white; padding: 25px; border-radius: 12px;
            width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transform: translateY(-20px); transition: 0.3s;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-content h3 { margin-top: 0; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; color: #666; margin-bottom: 5px; }
        .form-control {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 15px; box-sizing: border-box; outline: none; transition: border 0.3s;
        }
        .form-control:focus { border-color: #007bff; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 500; }
        .btn-cancel { background: #f1f3f5; color: #333; }
        .btn-save { background: #28a745; color: white; }
        .btn:hover { opacity: 0.9; }
        .popup-actions { margin-top: 10px; display: flex; gap: 5px; justify-content: center; }
        .popup-btn { padding: 4px 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; color: white; flex: 1; }
        .btn-edit { background-color: #ffc107; color: black; font-weight: bold; }
        .btn-delete { background-color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Modal Form -->
    <div id="tuzakModal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modalBaslik">Yeni Kayıt Ekle</h3>
            <input type="hidden" id="duzenlenenDocId" value="">
            <div class="form-group">
                <label>Ad Soyad</label>
                <input type="text" id="adSoyad" class="form-control" placeholder="Örn: Ahmet Yılmaz">
            </div>
            <div class="form-group">
                <label>Ünvan</label>
                <input type="text" id="unvan" class="form-control" placeholder="Örn: Muhtar, Çiftçi vs.">
            </div>
            <div class="form-group">
                <label>İl</label>
                <select id="il" class="form-control">
                    <option value="Rize" selected>Rize</option>
                    <option value="Trabzon">Trabzon</option>
                    <option value="Artvin">Artvin</option>
                    <option value="Diğer">Diğer</option>
                </select>
            </div>
            <div class="form-group">
                <label>İlçe</label>
                <select id="ilce" class="form-control">
                    <option value="Güneysu" selected>Güneysu</option>
                    <option value="Merkez">Merkez</option>
                    <option value="Çayeli">Çayeli</option>
                    <option value="Ardeşen">Ardeşen</option>
                    <option value="Diğer">Diğer</option>
                </select>
            </div>
            <div class="form-group">
                <label>Köy/Mahalle</label>
                <select id="koy" class="form-control">
                    <option value="" disabled selected>Lütfen seçiniz</option>
                    <option value="Adacami Mahallesi">Adacami Mahallesi</option>
                    <option value="Asmalıırmak Köyü">Asmalıırmak Köyü</option>
                    <option value="Aşağı Kiremit Mahallesi">Aşağı Kiremit Mahallesi</option>
                    <option value="Ballıdere Köyü">Ballıdere Köyü</option>
                    <option value="Başaran Mahallesi">Başaran Mahallesi</option>
                    <option value="Başköy Köyü">Başköy Köyü</option>
                    <option value="Birlik Mahallesi">Birlik Mahallesi</option>
                    <option value="Bulutlu Köyü">Bulutlu Köyü</option>
                    <option value="Çamlıca Köyü">Çamlıca Köyü</option>
                    <option value="Dumankaya Köyü">Dumankaya Köyü</option>
                    <option value="Eskicami Mahallesi">Eskicami Mahallesi</option>
                    <option value="Güneli Köyü">Güneli Köyü</option>
                    <option value="Gürgen Köyü">Gürgen Köyü</option>
                    <option value="İslahiye Köyü">İslahiye Köyü</option>
                    <option value="Kıbledağı Köyü">Kıbledağı Köyü</option>
                    <option value="Kiremit Mahallesi">Kiremit Mahallesi</option>
                    <option value="Küçükcami Mahallesi">Küçükcami Mahallesi</option>
                    <option value="Merkez Mahallesi">Merkez Mahallesi</option>
                    <option value="Ortaköy Köyü">Ortaköy Köyü</option>
                    <option value="Selamet Mahallesi">Selamet Mahallesi</option>
                    <option value="Tepebaşı Köyü">Tepebaşı Köyü</option>
                    <option value="Ulucami Mahallesi">Ulucami Mahallesi</option>
                    <option value="Yarımada Köyü">Yarımada Köyü</option>
                    <option value="Yenicami Mahallesi">Yenicami Mahallesi</option>
                    <option value="Yeniköy Köyü">Yeniköy Köyü</option>
                    <option value="Yeşilköy Köyü">Yeşilköy Köyü</option>
                    <option value="Yeşilyurt Köyü">Yeşilyurt Köyü</option>
                    <option value="Yukarı İslahiye Köyü">Yukarı İslahiye Köyü</option>
                    <option value="Yüksekköy Köyü">Yüksekköy Köyü</option>
                </select>
            </div>
            <div class="form-group">
                <label>Tuzak No</label>
                <input type="text" id="tuzakNo" class="form-control" placeholder="Örn: 105">
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="kapatModal()">İptal</button>
                <button class="btn btn-save" onclick="kaydet()">Kaydet</button>
            </div>
        </div>
    </div>

    <div id="harita"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script>
        // SİZİN FIREBASE BİLGİLERİNİZ
        const firebaseConfig = {
            apiKey: "AIzaSyBk53aTZ5cB2G_Fq64jRgkErEwmqOGNOBs",
            authDomain: "kokarca-tuzak-takip-sist-99696.firebaseapp.com",
            projectId: "kokarca-tuzak-takip-sist-99696",
            storageBucket: "kokarca-tuzak-takip-sist-99696.firebasestorage.app",
            messagingSenderId: "125586984500",
            appId: "1:125586984500:web:dbcc8cb4cad8904a2a8461",
            measurementId: "G-WXJQ4DJLJX"
        };

        // Sistemi Başlat
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Haritayı Başlat (Güneysu/Rize)
        var map = L.map('harita').setView([40.9400, 40.6300], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Konum Bulma Özelliği
        map.locate({setView: true, maxZoom: 16});

        function onLocationFound(e) {
            var radius = e.accuracy / 2;
            L.marker(e.latlng).addTo(map)
                .bindPopup("Şu an buradasınız").openPopup();
            L.circle(e.latlng, radius).addTo(map);
        }
        map.on('locationfound', onLocationFound);



        // Haritadaki iğneleri takip etmek için global nesne
        var markerListesi = {};

        // 1. ÖZELLİK: Veritabanındaki kayıtları canlı dinle (ekleme, değiştirme, silme)
        db.collection("tuzaklar").onSnapshot(function(querySnapshot) {
            querySnapshot.docChanges().forEach(function(change) {
                var data = change.doc.data();
                var docId = change.doc.id;
                
                if (change.type === "added" || change.type === "modified") {
                    var popupIcerik = "";
                    
                    var koyIsmi = data.koy || data.ad || "Bilinmiyor";
                    popupIcerik += "<b>Köy:</b> " + koyIsmi + "<br>";
                    
                    if (data.tuzakNo) popupIcerik += "<b>Tuzak No:</b> " + data.tuzakNo + "<br>";
                    
                    if (data.adSoyad) {
                        var ekleyen = data.adSoyad;
                        if (data.unvan) ekleyen += " (" + data.unvan + ")";
                        popupIcerik += "<b>Ekleyen:</b> " + ekleyen + "<br>";
                    } else {
                        popupIcerik += "<b>Ekleyen:</b> Sistem (Toplu Kayıt)<br>";
                    }

                    // Düzenle ve Sil butonları eklendi
                    popupIcerik += "<div class='popup-actions'>";
                    popupIcerik += "<button class='popup-btn btn-edit' onclick='tuzakDuzenle(\"" + docId + "\")'>Düzenle</button>";
                    popupIcerik += "<button class='popup-btn btn-delete' onclick='tuzakSil(\"" + docId + "\")'>Sil</button>";
                    popupIcerik += "</div>";
                    
                    if (change.type === "added") {
                        var marker = L.marker([data.lat, data.lng]).addTo(map).bindPopup(popupIcerik);
                        markerListesi[docId] = marker;
                    } else if (change.type === "modified") {
                        var marker = markerListesi[docId];
                        if (marker) {
                            marker.setLatLng([data.lat, data.lng]);
                            marker.setPopupContent(popupIcerik);
                        }
                    }
                }
                
                if (change.type === "removed") {
                    var marker = markerListesi[docId];
                    if (marker) {
                        map.removeLayer(marker);
                        delete markerListesi[docId];
                    }
                }
            });
        });

        // Seçilen konumu geçici olarak tutacağımız değişken
        var secilenKonum = null;

        // Tuzak Silme Fonksiyonu
        function tuzakSil(docId) {
            if (confirm("Bu kaydı haritadan silmek istediğinize emin misiniz?")) {
                db.collection("tuzaklar").doc(docId).delete().then(function() {
                    // Firebase onSnapshot otomatik silecek
                }).catch(function(error) {
                    alert("Silme hatası: " + error.message);
                });
            }
        }

        // Tuzak Düzenleme Modu
        function tuzakDuzenle(docId) {
            var marker = markerListesi[docId];
            if (!marker) return;

            // Veritabanından mevcut bilgileri çek
            db.collection("tuzaklar").doc(docId).get().then(function(doc) {
                if (doc.exists) {
                    var data = doc.data();
                    document.getElementById('modalBaslik').innerText = "Kaydı Düzenle (İğneyi sürükleyerek konum değiştirebilirsiniz)";
                    document.getElementById('duzenlenenDocId').value = docId;
                    
                    document.getElementById('adSoyad').value = data.adSoyad || "";
                    document.getElementById('unvan').value = data.unvan || "";
                    document.getElementById('il').value = data.il || "Rize";
                    document.getElementById('ilce').value = data.ilce || "Güneysu";
                    document.getElementById('koy').value = data.koy || data.ad || "";
                    document.getElementById('tuzakNo').value = data.tuzakNo || "";

                    secilenKonum = marker.getLatLng();

                    // Markeri sürüklenebilir yap
                    marker.dragging.enable();
                    marker.on('dragend', function(e) {
                        secilenKonum = e.target.getLatLng();
                    });

                    document.getElementById('tuzakModal').classList.add('active');
                    marker.closePopup();
                }
            });
        }

        // 2. ÖZELLİK: Haritaya tıklanınca modal formunu aç
        map.on('click', function(e) {
            document.getElementById('modalBaslik').innerText = "Yeni Kayıt Ekle";
            document.getElementById('duzenlenenDocId').value = "";
            secilenKonum = e.latlng;
            document.getElementById('tuzakModal').classList.add('active');
        });

        // Formu kapatma fonksiyonu
        function kapatModal() {
            document.getElementById('tuzakModal').classList.remove('active');
            
            // Düzenleme modundayken kapatıldıysa iğne sürüklemeyi devredışı bırak
            var docId = document.getElementById('duzenlenenDocId').value;
            if (docId && markerListesi[docId]) {
                markerListesi[docId].dragging.disable();
                markerListesi[docId].off('dragend');
            }

            // Formu temizle
            document.getElementById('adSoyad').value = "";
            document.getElementById('unvan').value = "";
            document.getElementById('il').value = "Rize";
            document.getElementById('ilce').value = "Güneysu";
            document.getElementById('koy').value = "";
            document.getElementById('tuzakNo').value = "";
            document.getElementById('duzenlenenDocId').value = "";
            
            secilenKonum = null;
        }

        // Veritabanına kaydetme / güncelleme fonksiyonu
        function kaydet() {
            var adSoyad = document.getElementById('adSoyad').value.trim();
            var unvan = document.getElementById('unvan').value.trim();
            var il = document.getElementById('il').value;
            var ilce = document.getElementById('ilce').value;
            var koy = document.getElementById('koy').value.trim();
            var tuzakNo = document.getElementById('tuzakNo').value.trim();
            var docId = document.getElementById('duzenlenenDocId').value;

            if (adSoyad === "") {
                alert("Lütfen Ad Soyad alanını doldurunuz.");
                return;
            }

            if (secilenKonum) {
                var saveData = {
                    adSoyad: adSoyad,
                    ad: koy, // Geriye dönük uyumluluk
                    unvan: unvan,
                    il: il,
                    ilce: ilce,
                    koy: koy,
                    tuzakNo: tuzakNo,
                    lat: secilenKonum.lat,
                    lng: secilenKonum.lng
                };

                if (docId) {
                    // Mevcut Kaydı Güncelle
                    db.collection("tuzaklar").doc(docId).update(saveData).then(function() {
                        alert("Kayıt başarıyla güncellendi.");
                        kapatModal();
                    }).catch(function(error) {
                        alert("Güncelleme başarısız oldu: " + error.message);
                    });
                } else {
                    // Yeni Kayıt
                    saveData.tarih = new Date().toLocaleDateString('tr-TR');
                    db.collection("tuzaklar").add(saveData).then(function() {
                        alert("Harika! Kayıt başarıyla eklendi.");
                        kapatModal();
                    }).catch(function(error) {
                        alert("Kayıt başarısız oldu: " + error.message);
                    });
                }
            }
        }
    </script>
</body>
</html>
